apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            limits:
              memory: "6Gi"
              cpu: "1"
            requests:
              memory: "4Gi"
              cpu: "500m"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: k8s-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
