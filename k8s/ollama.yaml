apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: k8s-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi # TinyLlama only needs ~650MB, but 5Gi leaves breathing room
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            limits:
              memory: "2Gi"
              cpu: "2000m"  # Minimum for usable CPU inference speed
            requests:
              memory: "1Gi"
              cpu: "1000m"
          lifecycle:
            postStart:
              exec:
                # Automatically downloads TinyLlama on startup
                command: ["/bin/sh", "-c", "sleep 5 && ollama pull tinyllama"]
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: k8s-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
