# =============================================================================
# NVIDIA API Key Secret — Template
# =============================================================================
# This file is a TEMPLATE. The actual API key value is NEVER committed here.
#
# The setup.sh script creates this secret dynamically at deploy time using:
#
#   kubectl create secret generic nvidia-api-key \
#     --namespace k8s-ai \
#     --from-literal=api-key="<YOUR_NVIDIA_API_KEY>"
#
# You can also apply this template manually after base64-encoding your key:
#
#   echo -n "nvapi-xxxx..." | base64
#
# Then replace <BASE64_ENCODED_KEY> below and run:
#
#   kubectl apply -f k8s/nvidia-secret.yaml
#
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: nvidia-api-key
  namespace: k8s-ai
  labels:
    app: kubeops-ai
    component: llm-credentials
type: Opaque
data:
  # Replace with your base64-encoded NVIDIA NIM API key:
  # echo -n "nvapi-xxxx..." | base64
  api-key: <BASE64_ENCODED_KEY>
