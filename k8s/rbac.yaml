# =============================================================================
# KubeOps-AI — RBAC Configuration (Cluster-Wide Read-Only + Guardrail Writes)
# =============================================================================
# This manifest creates a dedicated ServiceAccount for the backend pod and
# grants it:
#   1. Cluster-wide READ-ONLY access to all standard resources so that
#      RunWhen and kubectl can inspect every namespace without 403 errors.
#   2. Scoped WRITE permissions only for the verbs the guardrail
#      (app/agents/guardrail.py) explicitly allows.
#
# Allowed kubectl verbs (from guardrail):
#   get, describe, logs, set, rollout, scale,
#   annotate, label, top, cordon, uncordon, port-forward
#
# BLOCKED at both guardrail AND RBAC level:
#   delete, create (except port-forward), exec, apply, patch (raw), edit
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeops-ai-backend
  namespace: k8s-ai
  labels:
    app.kubernetes.io/name: kubeops-ai
    app.kubernetes.io/component: backend

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeops-ai-operator
  labels:
    app.kubernetes.io/name: kubeops-ai
    app.kubernetes.io/component: backend
rules:
  # ═══════════════════════════════════════════════════════════════════════════
  # READ-ONLY — Cluster-wide visibility for RunWhen and kubectl
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── Core API ("") ─────────────────────────────────────────────────────────
  - apiGroups: [""]
    resources:
      - pods
      - pods/log              # kubectl logs
      - pods/status
      - services
      - endpoints
      - nodes
      - nodes/status
      - namespaces
      - events
      - configmaps
      - secrets               # RunWhen might need to inspect secrets
      - replicationcontrollers
      - persistentvolumeclaims
      - persistentvolumes
      - resourcequotas
      - limitranges
      - serviceaccounts
    verbs: ["get", "list", "watch"]

  # ─── Apps ──────────────────────────────────────────────────────────────────
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/status
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]

  # ─── Batch ─────────────────────────────────────────────────────────────────
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]

  # ─── Networking ────────────────────────────────────────────────────────────
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingresses/status
      - networkpolicies
    verbs: ["get", "list", "watch"]

  # ─── Autoscaling ───────────────────────────────────────────────────────────
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

  # ─── Storage ───────────────────────────────────────────────────────────────
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["get", "list", "watch"]

  # ─── Policy ────────────────────────────────────────────────────────────────
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]

  # ─── RBAC (read-only — allows debugging permission issues) ─────────────────
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch"]

  # ─── CRDs (read-only) ─────────────────────
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]

  # ═══════════════════════════════════════════════════════════════════════════
  # MUTATING — Only what the guardrail explicitly allows
  # ═══════════════════════════════════════════════════════════════════════════

  # kubectl set image, kubectl rollout, kubectl scale
  - apiGroups: ["apps"]
    resources:
      - deployments
      - deployments/scale    # kubectl scale
      - replicasets
      - replicasets/scale
      - statefulsets
      - statefulsets/scale
      - daemonsets
    verbs: ["patch", "update"]

  # kubectl annotate, kubectl label, kubectl cordon/uncordon
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - services
      - namespaces
    verbs: ["patch", "update"]

  # kubectl top pods / kubectl top nodes (metrics API)
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]

  # kubectl port-forward (requires pods/portforward subresource)
  - apiGroups: [""]
    resources:
      - pods/portforward
    verbs: ["create"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeops-ai-operator-binding
  labels:
    app.kubernetes.io/name: kubeops-ai
    app.kubernetes.io/component: backend
subjects:
  - kind: ServiceAccount
    name: kubeops-ai-backend
    namespace: k8s-ai
roleRef:
  kind: ClusterRole
  name: kubeops-ai-operator
  apiGroup: rbac.authorization.k8s.io
