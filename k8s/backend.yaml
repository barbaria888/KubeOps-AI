apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Allowing scheduling on all nodes (Control-plane/Master/Unhealthy)
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
      containers:
        - name: backend
          image: hardik0811/kubeops-ai-backend:latest
          # ADDED: Explicit command to increase the internal API timeout
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--timeout-keep-alive", "500"]
          ports:
            - containerPort: 8000
          env:
            - name: KUBEOPS_ENABLE_VECTOR_STORE
              value: "false"
            - name: KUBEOPS_MAX_ANALYZED_ISSUES
              value: "1"
            - name: KUBEOPS_K8SGPT_TIMEOUT_SECONDS
              value: "120"
            - name: OLLAMA_TIMEOUT_SECONDS
              value: "60"
            - name: OLLAMA_URL
              value: "http://ollama:11434/api/generate"
            - name: KUBECONFIG
              value: "/etc/k3s-config/k3s.yaml"
          # Auto-configures k8sgpt on startup
          lifecycle:
            postStart:
              exec:
                command: 
                  - "/bin/sh"
                  - "-c"
                  - |
                    k8sgpt auth add --backend ollama --model tinyllama:latest --baseurl http://ollama:11434 && \
                    k8sgpt auth default --provider ollama
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: k8s-ai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
