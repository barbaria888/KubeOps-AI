apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # alowing scheduling on control-plane, master, and unhealthy nodes,{just get scheduled 🙏🥹}
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node.kubernetes.io/not-ready"
        operator: "Exists"
        effect: "NoExecute"
      - key: "node.kubernetes.io/unreachable"
        operator: "Exists"
        effect: "NoExecute"
      containers:
        - name: backend
          image: hardik0811/kubeops-ai-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434/api/generate"
            - name: KUBECONFIG
              value: "/root/.kube/k3s.yaml"
          # Auto-configures k8sgpt to use local Ollama on startup
          lifecycle:
            postStart:
              exec:
                command: 
                  - "/bin/sh"
                  - "-c"
                  - |
                    k8sgpt auth add --backend localai --model tinyllama --baseurl http://ollama:11434/v1 && \
                    k8sgpt auth default --provider localai
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "100m"
          volumeMounts:
            - name: kubeconfig
              mountPath: /root/.kube/k3s.yaml
              subPath: k3s.yaml
      volumes:
        - name: kubeconfig
          hostPath:
            path: /etc/rancher/k3s/k3s.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: k8s-ai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
